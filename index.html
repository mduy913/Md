<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>DELTA RSL SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --bg: #0b0b0b; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        .neon-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 14px; width: 100%; color: #fff; outline: none; transition: 0.3s; font-size: 14px; }
        .neon-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.15); }
        .btn-main { background: var(--cyan); color: #000; font-weight: 800; border-radius: 14px; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-main:active { transform: scale(0.97); opacity: 0.9; }
        .scroll-v { max-height: 250px; overflow-y: auto; scrollbar-width: none; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        td, th { padding: 14px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
        select { background-image: url('data:image/svg+xml;utf8,<svg fill="cyan" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 12px center; appearance: none; }
        option { background: #151515; color: #fff; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

<div id="auth-ui" class="glass p-10 w-full max-w-[420px] shadow-2xl">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-black italic tracking-tighter">DELTA <span class="text-cyan-400">RSL</span></h1>
        <p class="text-[10px] text-gray-500 uppercase mt-2 tracking-[0.4em] font-bold">Hệ Thống Phân Phối Key</p>
    </div>
    <div class="space-y-4">
        <select id="login-role" class="neon-input font-bold text-cyan-400 border-cyan-400/20">
            <option value="userctv">TRUY CẬP CTV</option>
            <option value="admin">TRUY CẬP ADMIN</option>
        </select>
        <input type="text" id="au" placeholder="Tên tài khoản" class="neon-input">
        <input type="password" id="ap" placeholder="Mật khẩu" class="neon-input">
        <button onclick="login()" class="btn-main w-full py-4 text-sm shadow-lg shadow-cyan-500/20">Đăng Nhập Hệ Thống</button>
    </div>
</div>

<div id="shop-ui" class="hidden w-full max-w-[600px] space-y-6 my-10">
    
    <div id="adm-box" class="hidden space-y-6">
        <div class="glass p-6 border border-cyan-400/20">
            <h2 class="text-cyan-400 font-extrabold text-[11px] uppercase mb-4 text-center tracking-widest">DANH SÁCH CTV</h2>
            <div class="scroll-v">
                <table>
                    <thead class="text-gray-500 text-[10px] uppercase"><tr><th>CTV</th><th>SỐ DƯ</th><th>THAO TÁC</th></tr></thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>

        <div class="glass p-6 border border-red-500/20">
            <h2 class="text-red-500 font-extrabold text-[11px] uppercase mb-5 text-center tracking-widest">CẤU HÌNH KHO HÀNG</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <select id="adm-type-select" class="neon-input" onchange="renderAdminPackages()">
                    <option value="ngay">Gói Ngày</option><option value="tuan">Gói Tuần</option><option value="thang">Gói Tháng</option><option value="nam">Gói Năm</option>
                </select>
                <button onclick="addPkgUI()" class="bg-white/5 hover:bg-white/10 py-2 rounded-xl text-[10px] font-bold uppercase transition border border-white/10">+ TẠO GÓI</button>
            </div>
            <div id="adm-list" class="space-y-2 mb-4"></div>
            <button onclick="savePkg()" class="btn-main w-full py-3 text-xs mb-8 shadow-md">Lưu Cấu Hình</button>
            
            <div class="grid grid-cols-2 gap-3 mb-3">
                <select id="n-type" class="neon-input" onchange="updateNSelect()"><option value="">Chọn Hạn</option><option value="ngay">Ngày</option><option value="tuan">Tuần</option><option value="thang">Tháng</option><option value="nam">Năm</option></select>
                <select id="n-pkg" class="neon-input"><option value="">Chọn Gói</option></select>
            </div>
            <textarea id="add-k" placeholder="Dán key vào đây (mỗi dòng 1 key)..." class="neon-input h-28 mb-3 font-mono text-xs"></textarea>
            <button onclick="napKey()" class="bg-white text-black font-black w-full py-4 rounded-xl text-xs uppercase shadow-lg">NẠP KEY VÀO KHO</button>
        </div>
    </div>

    <div id="ctv-box" class="hidden space-y-6">
        <div class="glass p-7 flex justify-between items-center border border-white/10 shadow-xl">
            <div><p class="text-[10px] text-gray-500 uppercase font-extrabold mb-1">Cộng tác viên</p><p id="u-id" class="font-black text-cyan-400 text-2xl tracking-tighter">...</p></div>
            <div class="text-right"><p class="text-[10px] text-gray-500 uppercase font-extrabold mb-1">Ví hiện tại</p><p id="u-bl" class="font-black text-yellow-400 text-2xl">0đ</p></div>
        </div>

        <div class="glass p-7 border border-cyan-400/10">
            <h3 class="text-[11px] font-bold text-gray-500 uppercase mb-6 text-center tracking-[0.3em]">MUA KEY HỆ THỐNG</h3>
            <div class="space-y-4">
                <select id="b-type" class="neon-input" onchange="updateBSelect()">
                    <option value="ngay">Hạn dùng: Ngày</option>
                    <option value="tuan">Hạn dùng: Tuần</option>
                    <option value="thang">Hạn dùng: Tháng</option>
                    <option value="nam">Hạn dùng: Năm</option>
                </select>
                <select id="b-pkg" class="neon-input font-bold text-cyan-400 border-cyan-400/30">
                    <option value="">— Chọn gói hack —</option>
                </select>
                <button onclick="buyKey()" class="btn-main w-full py-5 text-sm italic mt-2 shadow-2xl shadow-cyan-500/30">XÁC NHẬN THANH TOÁN</button>
            </div>
        </div>

        <div class="glass p-7 border border-yellow-500/10">
            <h3 class="text-[11px] font-bold text-yellow-500 uppercase mb-6 text-center tracking-[0.3em]">NẠP TIỀN TỰ ĐỘNG</h3>
            <div class="space-y-4">
                <input type="number" id="nap-amount" placeholder="Nhập số tiền cần nạp" class="neon-input text-center text-lg font-bold">
                <button onclick="generateQR()" class="w-full btn-main py-4 text-xs bg-yellow-400 hover:bg-yellow-300">HIỆN MÃ QR THANH TOÁN</button>
            </div>
        </div>

        <div class="glass p-7">
            <p class="text-[10px] font-bold text-gray-500 uppercase mb-5 tracking-widest border-b border-white/5 pb-2">NHẬT KÝ GIAO DỊCH</p>
            <div class="scroll-v"><table><tbody id="h-list"></tbody></table></div>
        </div>
    </div>
</div>

<script>
const config = { databaseURL: "https://shopmduy-default-rtdb.asia-southeast1.firebasedatabase.app" };
firebase.initializeApp(config);
const db = firebase.database();

const MY_BANK = { ID: "mbbank", STK: "0588807300000", NAME: "CAO MINH DUY" };
let curU, curUID, sysCache = {};

function login() {
    const u = document.getElementById('au').value.trim().toLowerCase();
    const p = document.getElementById('ap').value, r = document.getElementById('login-role').value;
    if(!u || !p) return Swal.fire('!', 'Nhập đủ tài khoản/mật khẩu', 'warning');

    db.ref('users/'+u).once('value', s => {
        const d = s.val();
        if(d && d.password === p && d.role === r) {
            curU = u; curUID = d.uid;
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('shop-ui').classList.remove('hidden');
            if(r === 'admin') { 
                document.getElementById('adm-box').classList.remove('hidden'); 
                loadUserList(); renderAdminPackages();
            } else { 
                document.getElementById('ctv-box').classList.remove('hidden');
                document.getElementById('u-id').innerText = u.toUpperCase();
                db.ref('users/'+u+'/balance').on('value', s => document.getElementById('u-bl').innerText = (s.val()||0).toLocaleString()+'đ');
                updateBSelect();
            }
            initHistory();
        } else Swal.fire('Lỗi', 'Sai thông tin đăng nhập!', 'error');
    });
}

function loadUserList() {
    db.ref('users').on('value', s => {
        const b = document.getElementById('user-list'); b.innerHTML = "";
        s.forEach(u => {
            const d = u.val();
            if(d.role === 'userctv') {
                b.innerHTML += `<tr><td class="font-bold text-white">${u.key.toUpperCase()}</td><td class="text-yellow-400 font-bold">${(d.balance||0).toLocaleString()}đ</td><td><button onclick="editBal('${u.key}',${d.balance||0})" class="bg-cyan-500 text-black px-4 py-1 rounded-lg font-bold text-[10px]">NẠP TIỀN</button></td></tr>`;
            }
        });
    });
}

function editBal(u, c) {
    Swal.fire({ title:'Nạp cho: '+u.toUpperCase(), input:'number', showCancelButton:true, background:'#151515', color:'#fff', confirmButtonColor:'#00f2ff' }).then(r => {
        if(r.value) db.ref('users/'+u+'/balance').set(Number(c)+Number(r.value));
    });
}

function addPkgUI(data={name:'', qty:1, price:''}, id=null) {
    const pkgId = id || 'pkg_' + Date.now();
    const div = document.createElement('div'); div.id = pkgId; div.className = "glass bg-white/[0.05] p-3 flex gap-2 pkg-row items-center border border-white/10";
    div.innerHTML = `
        <input type="text" placeholder="Tên gói" value="${data.name}" class="p-n neon-input flex-1 p-2 text-xs">
        <input type="number" placeholder="SL" value="${data.qty}" class="p-q neon-input w-14 p-2 text-center text-xs">
        <input type="number" placeholder="Giá" value="${data.price}" class="p-p neon-input w-24 p-2 text-xs text-yellow-400 font-bold">
        <button onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">✕</button>`;
    document.getElementById('adm-list').appendChild(div);
}

function renderAdminPackages() {
    const t = document.getElementById('adm-type-select').value, l = document.getElementById('adm-list'); l.innerHTML = "";
    db.ref('system/pkgs/'+t).once('value', s => { if(s.exists()) Object.entries(s.val()).forEach(([id, p]) => addPkgUI(p, id)); });
}

function savePkg() {
    const t = document.getElementById('adm-type-select').value, pkgs = {};
    document.querySelectorAll('.pkg-row').forEach(d => {
        const n = d.querySelector('.p-n').value, q = d.querySelector('.p-q').value, p = d.querySelector('.p-p').value;
        if(n && p) pkgs[d.id] = {name:n, qty:Number(q), price:Number(p)};
    });
    db.ref('system/pkgs/'+t).set(pkgs).then(() => {
        Swal.fire({icon:'success', title:'Đã lưu!', toast:true, position:'top-end', showConfirmButton:false, timer:2000});
        updateNSelect();
    });
}

function updateBSelect() {
    const t = document.getElementById('b-type').value;
    const s = document.getElementById('b-pkg');
    s.innerHTML = '<option value="">— Đang tải dữ liệu —</option>';

    db.ref('system/pkgs/' + t).on('value', snapshot => {
        const pkgs = snapshot.val();
        if (!pkgs) { s.innerHTML = '<option value="">— Hết hàng —</option>'; return; }
        
        s.innerHTML = '<option value="">— Chọn gói hack —</option>';
        Object.entries(pkgs).forEach(([id, p]) => {
            db.ref(`keys/${t}/${id}`).on('value', ks => {
                const count = ks.numChildren();
                let opt = s.querySelector(`option[value="${id}"]`);
                if(!opt) { opt = document.createElement('option'); opt.value = id; s.appendChild(opt); }
                // ĐỊNH DẠNG THEO MẪU: Giá / Tên (Còn X key)
                opt.textContent = `${Number(p.price).toLocaleString()}đ / ${p.name} (Còn ${count} key)`;
            });
        });
    });
}

function updateNSelect() {
    const t = document.getElementById('n-type').value, s = document.getElementById('n-pkg'); s.innerHTML = '<option value="">Chọn Gói</option>';
    db.ref('system/pkgs/'+t).once('value', snapshot => {
        if(snapshot.exists()) Object.entries(snapshot.val()).forEach(([id, p]) => s.innerHTML += `<option value="${id}">${p.name}</option>`);
    });
}

function napKey() {
    const t = document.getElementById('n-type').value, pid = document.getElementById('n-pkg').value, k = document.getElementById('add-k').value.split('\n').filter(x=>x.trim());
    if(!pid || !k.length) return Swal.fire('!', 'Thiếu thông tin nạp', 'error');
    
    db.ref(`system/pkgs/${t}/${pid}`).once('value', sp => {
        const q = sp.val().qty;
        if(k.length % q !== 0) return Swal.fire('!', `Số key phải chia hết cho ${q}`, 'warning');
        for(let i=0; i<k.length/q; i++) db.ref(`keys/${t}/${pid}`).push(k.slice(i*q, (i+1)*q).join('|'));
        document.getElementById('add-k').value=""; 
        Swal.fire('Thành công', `Đã nạp ${k.length/q} gói vào kho`, 'success');
    });
}

function buyKey() {
    const t = document.getElementById('b-type').value, pid = document.getElementById('b-pkg').value;
    if(!pid) return Swal.fire('!', 'Vui lòng chọn gói!', 'warning');

    db.ref(`system/pkgs/${t}/${pid}`).once('value', sp => {
        const p = sp.val();
        db.ref('users/'+curU+'/balance').once('value', sb => {
            let bal = sb.val()||0;
            if(bal < p.price) return Swal.fire('!', 'Số dư không đủ!', 'error');
            db.ref(`keys/${t}/${pid}`).limitToFirst(1).once('value', sk => {
                if(!sk.exists()) return Swal.fire('!', 'Kho đã hết key!', 'error');

                db.ref('users/'+curU+'/balance').set(bal - p.price);
                const kID = Object.keys(sk.val())[0], kv = sk.val()[kID];
                db.ref(`keys/${t}/${pid}/${kID}`).remove();
                db.ref('history/'+curUID).push({ time: new Date().toLocaleString(), name: p.name, key: kv });

                Swal.fire({
                    title: 'MUA THÀNH CÔNG',
                    background: '#0b0b0b', color: '#00f2ff',
                    html: `<div class="mt-4"><textarea readonly class="neon-input h-32 text-cyan-400 font-mono text-center text-sm">${kv.replace(/\|/g,'\n')}</textarea></div>`,
                    confirmButtonText: 'COPY KEY'
                }).then(() => {
                    navigator.clipboard.writeText(kv.replace(/\|/g,'\n'));
                    Swal.fire({toast:true, title:'Đã copy!', position:'top', showConfirmButton:false, timer:1500, icon:'success'});
                });
            });
        });
    });
}

function generateQR() {
    const amount = document.getElementById('nap-amount').value;
    if (!amount || amount < 10000) return Swal.fire('!', 'Tối thiểu 10.000đ', 'error');
    const desc = `NAP ${curU.toUpperCase()}`;
    const qrUrl = `https://img.vietqr.io/image/${MY_BANK.ID}-${MY_BANK.STK}-compact2.png?amount=${amount}&addInfo=${encodeURIComponent(desc)}&accountName=${encodeURIComponent(MY_BANK.NAME)}`;
    
    Swal.fire({
        background: '#0b0b0b', color: '#fff',
        html: `
            <div class="p-2">
                <p class="text-cyan-400 font-black mb-5 tracking-widest uppercase">Quét mã nạp tiền</p>
                <img src="${qrUrl}" class="w-64 h-64 mx-auto mb-5 border-4 border-cyan-400/30 rounded-3xl p-2 bg-white">
                <div class="text-left bg-white/5 p-5 rounded-2xl text-[12px] border border-white/10">
                    <p class="mb-2"><b>STK:</b> ${MY_BANK.STK}</p>
                    <p class="mb-2"><b>SỐ TIỀN:</b> <span class="text-yellow-400 font-bold">${Number(amount).toLocaleString()}đ</span></p>
                    <p class="text-cyan-400 font-bold"><b>NỘI DUNG:</b> ${desc}</p>
                </div>
            </div>`,
        confirmButtonText: 'XÁC NHẬN ĐÃ CHUYỂN',
        confirmButtonColor: '#00f2ff'
    });
}

function initHistory() {
    if(curUID) {
        db.ref('history/'+curUID).on('value', s => {
            const b = document.getElementById('h-list'); b.innerHTML = "";
            s.forEach(i => {
                const v = i.val();
                b.innerHTML = `<tr><td class="text-gray-500">${v.time.split(' ')[0]}</td><td class="font-bold text-white">${v.name}</td><td class="text-cyan-400 font-mono italic">${v.key.substring(0,8)}...</td></tr>` + b.innerHTML;
            });
        });
    }
}
</script>
</body>
</html>
